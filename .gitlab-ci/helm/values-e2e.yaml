env:
  SPRING_PROFILES_ACTIVE: e2e
  SPRING_DATASOURCE_URL: "vault:eafdmmart/data/test/e2e/fdm#url"
  SPRING_DATASOURCE_USERNAME: "vault:eafdmmart/data/test/e2e/fdm#username"
  SPRING_DATASOURCE_PASSWORD: "vault:eafdmmart/data/test/e2e/fdm#password"
  INTEGRATION_CAMUNDA_SERVER_URL: "vault:eafdmmart/data/test/e2e/fdm#camundaserverurl"
  INTEGRATION_PACK_LOADER_SERVER_URL: "vault:eafdmmart/data/test/e2e/fdm#packloaderserver"
  AWS_S3_ACCESS_KEY: "vault:eafdmmart/data/test/e2e/fdm#documentsS3ApiKey"
  AWS_S3_SECRET_KEY: "vault:eafdmmart/data/test/e2e/fdm#documentsS3Secret"
  AWS_S3_REGION: "yd-s3test-ceph04-hl-vimpelcom-ru"
  AWS_S3_ENDPOINT: "https://yd-s3test-ceph04-hl.vimpelcom.ru"
  AWS_S3_BUCKET_NAME: "arch-code-documents-dev"

podAnnotations:
  vault.security.banzaicloud.io/vault-addr: "https://vault-test.vimpelcom.ru/"

ingress:
  annotations:
    nginx.ingress.kubernetes.io/cors-allow-headers: Content-Type, authorization, Content-Disposition
    nginx.ingress.kubernetes.io/cors-allow-methods: GET, POST, PUT, DELETE, OPTIONS
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/enable-cors: 'true'
    nginx.ingress.kubernetes.io/cors-expose-headers: "Content-Disposition"

resources:
  limits:
    cpu: 250m
    memory: 512Mi
  requests:
    cpu: 50m
    memory: 256Mi
